<section class="schedule-section container">
    <img class="section-head-image"
         src="/assets/events/compile/2025/img/icons/calendar.png"
         alt="Calendar">
    <h1>Schedule</h1>
    <p class="description">
        Dev8 BOOT 2026 will be held on <strong>April 4, 2026</strong>
        via <strong>Zoom</strong>. The schedule below is tentative and is
        subject to change.
    </p>
    <div class="window">
        <div class="window__body">
            <div class="window__header">
                <h1 class="window__title">Schedule</h1>
                <button class="window__close">
                    <img src="/assets/img/icons/close-button.svg"
                         alt="Window Close Button">
                </button>
            </div>
            <div class="window__content">
                <table class="schedule-table">
                    <tr>
                        <th scope="col">Activity</th>
                        <th scope="col">Start Time</th>
                        <th scope="col">End Time</th>
                    </tr>
                    {% for startTime, endTime, activity in boot2026_schedule['data'] %}
                    <tr>
                        <td class="activity">{{ activity }}</td>
                        <td class="time">{{ startTime }}</td>
                        <td class="time">{{ endTime }}</td>
                    </tr>
                    {% endfor %}
                </table>
            </div>
        </div>
    </div>
</section>
