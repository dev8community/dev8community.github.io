{% import 'pages/_components.html' as components %}

<section class="watch-section container">
    <img class="section-head-image"
         src="/assets/img/icons/video.webp"
         alt="Calendar">
    <h1>Watch Dev8 BOOT 2026</h1>
    <p class="description">
        Experience the entire online mini-conference anytime anywhere, or you
        can choose to just watch specific parts of the event or jam to tunes we
        used during the event via the
        <a href="/events/boot/2026/videos">Dev8 BOOT 2026 YouTube playlist</a>.
    </p>
    <div class="window video iframe">
        <div class="window__body">
            <div class="window__header">
                <h1 class="window__title">
                    Dev8 BOOT 2026
                </h1>
                <button class="window__close">
                    <img src="/assets/img/icons/close-button.svg">
                </button>
            </div>
            <div class="window__content">
                <iframe src="https://www.youtube.com/embed/RfRM_Tf3Krw?si=eXWEWSXtgsMOzDPF"
                        title="YouTube video player"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin"
                        allowfullscreen></iframe>
            </div>
        </div>
    </div>
</section>
